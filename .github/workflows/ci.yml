name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Start server
        run: npm run dev &
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/api/ping && break || sleep 2
          done
      - name: Run tests
        run: npm test
